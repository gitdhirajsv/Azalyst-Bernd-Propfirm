  - { symbol: "USDCAD=X", name: "USDCAD", asset_class: "forex", cot_symbol: "6C=F" }
  - { symbol: "USDCHF=X", name: "USDCHF", asset_class: "forex", cot_symbol: "6S=F" }

  # ── FOREX CROSSES (EUR/GBP/AUD/JPY/CHF/NZD/CAD groups) ───────
