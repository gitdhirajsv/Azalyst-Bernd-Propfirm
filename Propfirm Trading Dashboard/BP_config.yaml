  # `name`       -- broker symbol shown on the dashboard
  # `asset_class` -- drives indicator settings (COT lookback, Valuation refs, etc.)
  # `cot_symbol` -- optional override for COT lookup when OHLCV ticker is a
  #                 spot/CFD that has no direct CFTC report. Defaults to `symbol`.
  # ------------------------------------------------------------

  # ── FOREX MAJORS — USD on right (direct COT mapping) ──────────
  - { symbol: "EURUSD=X", name: "EURUSD", asset_class: "forex", cot_symbol: "6E=F" }
  - { symbol: "GBPUSD=X", name: "GBPUSD", asset_class: "forex", cot_symbol: "6B=F" }
