zone_detection:
  leg_in_min_candles: 3
  base_max_candles: 6
  base_min_candles: 1
  leg_out_body_multiplier: 2.0
  base_wick_max_pct: 0.50
  profit_margin_min_ratio: 3.0

qualifier_weights:
  departure: 0.30
  base_duration: 0.10
  freshness: 0.15
  originality: 0.15
  profit_margin: 0.10
  arrival: 0.10
  level_on_top: 0.10

patterns:
  hammer:
    body_max_pct: 0.30
    lower_wick_min_mult: 2.0
    upper_wick_max_pct: 0.20    # Loosened from 0.10 -- Bernd doesn't enforce a hard cap
  bullish_engulfing:
    body_engulf_required: true
  shooting_star:
    body_max_pct: 0.30
    upper_wick_min_mult: 2.0
    lower_wick_max_pct: 0.20
  hanging_man:
    body_max_pct: 0.30
    lower_wick_min_mult: 2.0
    upper_wick_max_pct: 0.20

stop_loss:
  fibonacci_extension_pct: 33.0
  breakeven_at_r: 1.0                # Conservative: BE at T1 (textbook)
  breakeven_at_half_target: true     # Aggressive: BE at half-way to T1 (Bernd's live)
  partial_take_r: 2.0
  full_take_r: 3.0

cot:
  lookback_weeks: 52
  upper_extreme: 80
  lower_extreme: 20

valuation:
  length: 10                          # default ROC ("cycle" period)
  rescale_length: 100
  overvalued_threshold: 75
  undervalued_threshold: -75
  references: ["DX-Y.NYB", "GC=F", "ZB=F"]
  # Per-symbol cycle (ROC) override -- Bernd's "30/10/13-day cycles" are
  # just the Valuation indicator with different ROC periods (Hybrid AI
  # 1:53:38). Phase 24: populated per the cheatsheet + course transcripts.
  cycle_per_symbol:
    # Mega-cap tech daily trend-following (HAI 0:59:34, Ch.117 CW41)
    AAPL:  30
    MSFT:  30
    GOOG:  30
    GOOGL: 30
    META:  30
    AMZN:  30
    NFLX:  30
    NVDA:  30
    TSLA:  30
    # Equity index futures: 10-day for daily reads, 13-day for weekly end-of-band
    NQ=F:  10
    ES=F:  10
    YM=F:  13          # DOW slower-moving, 13-day per OTC L8
    RTY=F: 10
    # Forex (10-day matches Pine Script default; documented for clarity)
    6E=F:  10
    6B=F:  10
    6J=F:  10
    6S=F:  10
    EURUSD=X: 10
    GBPUSD=X: 10
    USDJPY=X: 10
    USDCHF=X: 10
    # Commodities at 10-day default; PMs use 10 too (CampusValuationTool default)
    GC=F:  10
    SI=F:  10
    PL=F:  10
    PA=F:  10
    CL=F:  10
    # NG=F has Valuation excluded entirely (cheatsheet "-") — listed for reference
    # NG=F: 10  (commented; Valuation skipped via VALUATION_SKIP_SYMBOLS)

seasonality:
  lookback_years: 15
  bias_lookahead_bars: 20

api:
  host: "0.0.0.0"
  port: 8000
