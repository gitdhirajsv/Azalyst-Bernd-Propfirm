name: Scan all coins (daily)

# Daily all-coins Bernd-accuracy tracker. Runs the SAME engine as the
# FundingPips scanner (scan.yml) but with the `allcoins` profile:
#   * prop-firm gating OFF -> takes EVERY qualifying signal (no 3-position /
#     loss-cap limits), so its paper-trading record measures raw directional
#     accuracy -- "how often is Bernd's method right" across all asset classes.
#   * expanded ~308-symbol watchlist (BP_config_allcoins.yaml override).
#   * writes its OWN *_allcoins state files, so the FundingPips challenge
#     account (scan.yml + paper_trader_state.json) is completely untouched.
#
# It commits a SLIM signals artifact (scan_results_allcoins_slim.json, a few
# hundred KB -- the full scan_results is ~30MB of OHLCV cache and is NOT
# committed) which the TradingView Ideas workflow reads to pick + post ideas.
#
# Optional repository secret:
#   DISCORD_WEBHOOK_ALLCOINS_URL  -- separate channel for the all-coins feed
#                                    (leave unset to disable Discord here).

on:
  schedule:
    - cron: '37 6 * * *'           # daily 06:37 UTC. Off-peak minute (:37) and a
                                    # different minute than scan.yml (:17) so the
                                    # two never collide.
  workflow_dispatch:               # manual trigger from the Actions tab

# DISTINCT concurrency group from scan.yml ("scan-markets") so the daily
# all-coins run and the 4-hourly FundingPips run never serialize against each
# other -- they touch disjoint committed files.
concurrency:
  group: scan-allcoins
  cancel-in-progress: false

jobs:
  scan-allcoins:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write              # required to commit the slim artifact + state

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Propfirm Trading Dashboard/requirements.txt'

      - name: Install dependencies
        run: pip install -r "Propfirm Trading Dashboard/requirements.txt"

      - name: Run all-coins scan (headless)
        working-directory: Propfirm Trading Dashboard
        run: python run_scanner.py --no-open --strategy weekly --profile allcoins
        # --profile allcoins => BP_config_allcoins.yaml merged over BP_config.yaml,
        # writes scan_results_allcoins_slim.json + *_allcoins state, never touches
        # the FundingPips paper_trader_state.json.

      - name: Post Discord summary (optional, separate channel)
        working-directory: Propfirm Trading Dashboard
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_ALLCOINS_URL }}
          DISCORD_USER_ID:     ${{ secrets.DISCORD_USER_ID }}
          AZALYST_STATE_SUFFIX: _allcoins
        run: python send_discord.py
        # send_discord.py no-ops when the webhook env is unset, so leaving
        # DISCORD_WEBHOOK_ALLCOINS_URL unconfigured is safe.

      - name: Commit slim artifact + all-coins state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit the SLIM signals file (TV Ideas source) + the small all-coins
          # state files. The full scan_results_allcoins.json (~30MB OHLCV cache)
          # is intentionally NOT committed -- same rationale as scan.yml.
          git add -f \
            "Propfirm Trading Dashboard/scan_results_allcoins_slim.json" \
            "Propfirm Trading Dashboard/paper_trader_state_allcoins.json" \
            "Propfirm Trading Dashboard/scan_history_allcoins.json" \
            "Propfirm Trading Dashboard/discord_state_allcoins.json" || true
          if git diff --staged --quiet; then
            echo "No all-coins changes to commit."
          else
            git commit -m "scan(allcoins): daily slim signals [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
